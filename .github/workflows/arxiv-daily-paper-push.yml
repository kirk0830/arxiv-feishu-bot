name: arXiv Daily Paper Push

on:
  schedule:
    # Runs daily at 01:37 UTC (09:37 Beijing Time)
    - cron: '37 1 * * *'
  workflow_dispatch:

jobs:
  push-papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.0
          cache: true
      - name: Run arXiv bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          MAX_PAPERS: ${{ secrets.MAX_PAPERS || '10' }}
        run: pixi run lark-arxivbot \
          --category '"physics.chem-ph"||"cond-mat.mtrl-sci"||"physics.comp-ph"' \
          --keyword '"molecular dynamics"&&("machine learning"||"deep learning"||"neural network"||"algorithm")'
