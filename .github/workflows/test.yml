name: Tests

on:
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.0
          cache: true
      - name: Run tests
        run: pixi run --environment test pytest tests/ -v
